<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кето Калькулятор: Расчет БЖУ онлайн</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; color: #333; padding: 20px; }
        .calc-container { max-width: 450px; margin: 30px auto; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; font-size: 24px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #219653; }
        .result { margin-top: 20px; padding: 15px; background: #e8f8f5; border-radius: 4px; display: none; }
        .result h3 { margin-top: 0; color: #16a085; }
    </style>
</head>
<body>

<div class="calc-container">
    <h1>Кето-Калькулятор БЖУ</h1>
    <div class="form-group">
        <label>Пол:</label>
        <select id="gender">
            <option value="male">Мужской</option>
            <option value="female">Женский</option>
        </select>
    </div>
    <div class="form-group">
        <label>Вес (кг):</label>
        <input type="number" id="weight" placeholder="Например: 70" required>
    </div>
    <div class="form-group">
        <label>Рост (см):</label>
        <input type="number" id="height" placeholder="Например: 175" required>
    </div>
    <div class="form-group">
        <label>Возраст (лет):</label>
        <input type="number" id="age" placeholder="Например: 30" required>
    </div>
    <div class="form-group">
        <label>Цель:</label>
        <select id="goal">
            <option value="lose">Похудение (-20% калорий)</option>
            <option value="maintain">Поддержание веса</option>
        </select>
    </div>
    <button onclick="calculateKeto()">Рассчитать норму БЖУ</button>

    <div class="result" id="resultBlock">
        <h3>Ваша суточная кето-норма:</h3>
        <p><strong>Калории:</strong> <span id="resCalories">0</span> ккал</p>
        <p><strong>Жиры (75%):</strong> <span id="resFats">0</span> г</p>
        <p><strong>Белки (20%):</strong> <span id="resProteins">0</span> г</p>
        <p><strong>Углеводы (5%):</strong> <span id="resCarbs">0</span> г</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
